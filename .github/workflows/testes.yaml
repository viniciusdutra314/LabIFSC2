name: Unit Testes

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  pytest:
    name: ${{ matrix.python-version }} on ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        python-version: ["pypy@3.11", "3.11", "3.12", "3.13", "3.14"]
        os:
          [
            windows-latest,
            windows-11-arm,
            macos-latest,
            ubuntu-latest,
            ubuntu-26.04-arm,
          ]
        exclude:
          - python-version: "pypy@3.11"
            os: windows-11-arm
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv and Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies for the full test suite
        if: matrix.python-version != 'pypy@3.11'
        run: uv sync --locked --group test --group linter

      - name: Install dependencies for the PyPy compatibility suite
        if: matrix.python-version == 'pypy@3.11'
        run: uv sync --locked --no-dev --group test-pypy

      - name: Run all possible tests on CPython
        if: matrix.python-version != 'pypy@3.11'
        env:
          PYTHONIOENCODING: utf-8
        run: uv run task test-all

      - name: Run limited tests on PyPy
        if: matrix.python-version == 'pypy@3.11'
        env:
          PYTHONIOENCODING: utf-8
        run: >-
          uv run --locked --no-dev --group test-pypy pytest -vv -s
          --ignore=tests/doctest