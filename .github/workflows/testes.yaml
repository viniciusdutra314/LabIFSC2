name: Unit Testes

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  pytest:
    name: ${{ matrix.python-version }} on ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11","3.12", "3.13","3.14"] 
        os: [windows-latest,windows-11-arm,macos-latest, ubuntu-latest,ubuntu-26.04-arm ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Install dependencies
        run: uv sync --group test --group linter

      - name: mypy
        env:
            PYTHONIOENCODING: utf-8
        run: uv run --group linter mypy LabIFSC2/ tests/

      - name: Testing code with pytest
        env:
          PYTHONIOENCODING: utf-8
        run: uv run --group test pytest -vv -s

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
